trigger:
- main

resources:
- repo: self

variables:
  - group: CICD
#  - name: appVersion
#    value: $[variables.appVersion]

parameters:
  - name: tag
    default: "$(Build.BuildId)"
  - name: imageName
    default: "demo-page"

stages:
- stage: CICD
  displayName: CICD workflow
  jobs:
  - job: Build
    displayName: Build
    pool: local-agent

    steps:
    - task: Docker@2
      displayName: Build an image
      inputs:
        repository: ${{ parameters.imageName }}  
        command: build
        dockerfile: "**/Dockerfile"
        tags: ${{ parameters.tag }} 
        arguments: '--build-arg VERSION=${{ parameters.tag }}' 
        containerRegistry: 'registryConnection'

    - task: Docker@2 # <------------------------------ push task
      displayName: 'Push Docker Image'
      inputs:
        command: 'push'
        containerRegistry: 'registryConnection' 
        repository: ${{ parameters.imageName }}
        tags: ${{ parameters.tag }}
  - job: Deploy
    displayName: Deploy
    dependsOn: Build
    pool: local-agent
    steps:
      - task: AzureContainerApps@1

        inputs:
          azureSubscription: 'appDeployConnection'
          imageToDeploy: acappssandy.azurecr.io/${{ parameters.imageName }}:${{ parameters.tag }}

          containerAppName: 'app-demo-page'
          resourceGroup: rg-devops

          acrUsername: $(acrUsername)
          acrPassword: $(acrPassword)